# 919D照合ECU プロジェクト設定
# 各スクリプトはこの設定ファイルを読み込んで動作する

project_name: "919D照合ECU WakeSleep"

# XFileConvパス（CRAMAS環境共通）
xfileconv: "C:\\simbase\\system\\bin\\XFileConv.exe"

# 一時ファイルフォルダ（リポジトリルートからの相対パス）
temp_dir: ".cache"

# テストセットの識別パターン
test_set:
  first_file_marker: "000h00m27s"
  step_column: "AfterStressChk_Step1"
  time_column: "TIME(sec)"
  ng_columns:
    - name: "ng_number1"
      offset: 0
    - name: "ng_number2"
      offset: 32
    - name: "ng_number3"
      offset: 64

# NG番号→説明（uf.cのNG一覧より）
ng_names:
  10: "Sleep失敗"
  11: "Sleep失敗(1分待機できず)"
  12: "エンジン始動失敗"
  13: "エンジン停止失敗"
  20: "ブザー誤吹鳴"
  30: "インジケーター異常"
  40: "UWB異常(Aコード照合)"
  41: "UWB異常(エミュレータ出力)"
  50: "ドアロック異常"
  60: "CAN通信停止異常"
  61: "CAN通信途絶"
  70: "CLG1異常(時間超過)"
  71: "CLG1異常(時間不足)"
  72: "CLG2異常(時間超過)"
  73: "CLG2異常(時間不足)"
  74: "CLG5異常(動作停止中に動作)"
  75: "CLG5異常(動作開始後に不動作)"
  80: "メーターディスプレイ異常"
  81: "ステロクロック異常"
  82: "SWILイルミ異常"
  90: "LIN通信停止異常"
  91: "LIN通信途絶"
  92: "PFW誤出力"
